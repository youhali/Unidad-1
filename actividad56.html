<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo JavaScript - Cambiar estilo</title>
</head>
<body>

  <h1>Cambiar un estilo con JavaScript:</h1>

  <button type="button" onclick="document.getElementById('demo').style.fontSize='35px'">
    Agrandar texto
  </button>

  <button type="button" onclick="document.getElementById('demo').style.fontSize='16px'">
    Regresar texto
  </button>

  <p id="demo">JEste sera el texto que se modificara </p>

</body>
</html>
